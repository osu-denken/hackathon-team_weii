<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>Controller of "phone ∧ shoot"</title>
        <link rel="stylesheet" href="styles.css?v=18" />
    </head>
    <body>
        <button id="btn-fullscreen" class="btn-floating top-right btn-square" title="全画面表示">
            <svg id="icon-fullscreen-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
            <svg id="icon-fullscreen-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;display:none;">
                <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>
            </svg>
        </button>
        <button id="btn-reset-position" class="btn-floating bottom-right" disabled>傾きリセット</button>
        <div class="main-layout">
            <div class="left-panel">
                <input type="hidden" id="ws-url" value="">
                <button id="btn-join" class="btn-flat join-state">JOIN</button>

                <div class="player-card-bottom" id="player-info" style="visibility: hidden; width:100%;">
                    <div class="pcb-left" style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
                        <div id="pcb-meter" class="pcb-item-meter" style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.2);flex-shrink:0;">
                            <div id="pcb-icon" class="pcb-icon" style="width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-weight:700;color:#fff;transition:all 0.2s;background-size:180%;background-position:center 20%;image-rendering:pixelated;background-repeat:no-repeat;border:2px solid #1e293b;"></div>
                        </div>
                        <div style="display:flex;flex-direction:column;align-items:flex-start;overflow:hidden;gap:2px;">
                            <div id="pcb-name" class="pcb-name" style="font-weight:700;transition:color 0.2s;white-space:nowrap;font-size:14px;"></div>
                            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                                <div id="pcb-status" class="pcb-status" style="font-size:12px;color:#cfeffd;white-space:nowrap;"></div>
                                <div id="pcb-respawn" class="pcb-respawn" style="display:none;font-size:12px;font-weight:700;color:#f87171;white-space:nowrap;"></div>
                            </div>
                            <div id="pcb-hp-blocks" class="pcb-hp-blocks" style="display:flex;gap:2px;flex-wrap:wrap;"></div>
                        </div>
                    </div>
                </div>

                <div class="difficulty-controls" id="difficulty-controls" style="display: none;">
                    <button id="difficulty-normal" class="difficulty-btn active" type="button">ノーマル</button>
                    <button id="difficulty-hard" class="difficulty-btn" type="button">ハード</button>
                </div>

                <div class="item-section">
                    <button id="btn-use-item" class="item-slot" disabled>
                        <img id="item-icon" alt="" />
                    </button>
                </div>
            </div>

            <div class="controller-area">
                <button id="btn-shoot" disabled>SHOOT</button>
            </div>
        </div>
        <script src="main.js?v=18"></script>
    </body>
</html>
