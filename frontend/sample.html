<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Viewer Prototype</title>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: radial-gradient(circle at top, #f2f7ff, #cfd6e6 60%, #b9c0d0);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .frame {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }

      header {
        padding: 12px 20px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #1f2a44;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .status {
        position: fixed;
        right: 16px;
        top: 14px;
        padding: 6px 10px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.12);
        color: #1f2a44;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <header>Viewer Prototype</header>
      <canvas id="stage"></canvas>
    </div>
    <div class="status" id="status">disconnected</div>

    <script>
      const canvas = document.getElementById('stage');
      const statusEl = document.getElementById('status');
      const ctx = canvas.getContext('2d');

      const state = {
        characters: [],
        bullets: [],
        enemies: [],
      };

      const resize = () => {
        const { width, height } = canvas.getBoundingClientRect();
        const scale = window.devicePixelRatio || 1;
        canvas.width = Math.floor(width * scale);
        canvas.height = Math.floor(height * scale);
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
      };

      window.addEventListener('resize', resize);
      resize();

      const wsProtocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const wsUrl = `${wsProtocol}://${window.location.hostname}:3001`;
      const socket = new WebSocket(wsUrl);

      socket.addEventListener('open', () => {
        statusEl.textContent = 'connected';
        socket.send(JSON.stringify({ type: 'viewer' }));
      });

      socket.addEventListener('close', () => {
        statusEl.textContent = 'disconnected';
      });

      socket.addEventListener('message', (event) => {
        let payload;
        try {
          payload = JSON.parse(event.data);
        } catch (error) {
          return;
        }

        if (payload.type === 'update') {
          if (Array.isArray(payload.characters)) {
            state.characters = payload.characters;
          }
          if (Array.isArray(payload.bullets)) {
            state.bullets = payload.bullets;
          }
          if (Array.isArray(payload.enemies)) {
            state.enemies = payload.enemies;
          }
        }
      });

      const toCanvasX = (x) => {
        const width = canvas.getBoundingClientRect().width;
        return width / 2 + x * 60;
      };

      const draw = () => {
        const { width, height } = canvas.getBoundingClientRect();

        // 画面をクリア
        ctx.clearRect(0, 0, width, height);

        // 地面
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, height - 90, width, 4);

        // プレイヤー
        ctx.fillStyle = '#2563eb';
        state.characters.forEach((player) => {
          ctx.beginPath();
          ctx.arc(toCanvasX(player.x), height - 120, 18, 0, Math.PI * 2);
          ctx.fill();
        });

        // 弾
        ctx.fillStyle = '#f97316';
        state.bullets.forEach((bullet) => {
          const y = height - 120 - bullet.y * 40;
          ctx.beginPath();
          ctx.arc(toCanvasX(bullet.x), y, 6, 0, Math.PI * 2);
          ctx.fill();
        });

        // 敵
        ctx.fillStyle = '#ef4444';
        state.enemies.forEach((enemy) => {
          const y = height - 120 - enemy.y * 40;
          ctx.beginPath();
          ctx.arc(toCanvasX(enemy.x), y, 12, 0, Math.PI * 2);
          ctx.fill();
        });

        // 次のフレームを要求
        requestAnimationFrame(draw);
      };

      draw();
    </script>
  </body>
</html>
