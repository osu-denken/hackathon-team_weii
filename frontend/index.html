<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Viewer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "ヒラギノ角ゴ ProN", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: #e7eef8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.15), transparent 18%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.10), transparent 20%),
        linear-gradient(180deg, #020613 0%, #08112c 35%, #061027 100%);
      color: #e2e8f0;
    }

    /* top-bar and side panels removed; styles cleaned */

    .game-summary {
      display: grid;
      gap: 12px;
      padding: 16px;
      background: rgba(15, 23, 42, 0.06);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .score-row,
    .game-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
      color: #e2e8f0;
    }

    .score-gauge {
      display: grid;
      gap: 6px;
    }

    .gauge-track {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .gauge-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #8b5cf6);
      border-radius: 999px;
      transition: width 240ms ease;
    }

    .gauge-label {
      font-size: 0.82rem;
      color: #cbd5e1;
      text-align: right;
    }

    .player-summary {
      display: grid;
      gap: 10px;
    }

    .player-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      font-size: 0.92rem;
    }

    .player-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #040916;
      background: linear-gradient(135deg, #38bdf8, #8b5cf6);
      border: 2px solid rgba(255, 255, 255, 0.16);
    }

    .player-info {
      display: grid;
      gap: 4px;
    }

    .player-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .player-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #34d399, #10b981);
    }

    .frame {
      flex: 1;
      display: grid;
    }

    .stage-wrapper {
      position: relative;
      width: 100%;
      min-height: 420px;
      overflow: hidden;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(16, 185, 129, 0.10), transparent 16%),
        linear-gradient(180deg, #08122d 0%, #040716 72%, #01050f 100%);
    }

    canvas { z-index: 0; }

    /* Overlays on top of the stage */
    .overlay-qr {
      position: absolute;
      left: 12px;
      top: 12px;
      width: 80px;
      height: 80px;
      opacity: 0.72;
      border-radius: 8px;
      overflow: hidden;
      pointer-events: none;
      z-index: 30;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      display: grid;
      place-items: center;
      backdrop-filter: blur(4px);
    }

    .overlay-qr img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .overlay-top {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(2,6,20,0.36);
      backdrop-filter: blur(6px);
      color: #e6f6ff;
      font-weight: 700;
    }

    .overlay-player-count { font-size: 14px; letter-spacing: 0.04em; }

    .overlay-score { display: flex; gap: 8px; align-items: center; }
    .overlay-score .gauge-track { width: 220px; height: 12px; }
    .overlay-score .gauge-label { width: 48px; text-align: right; }

    .overlay-time { font-size: 13px; color: #cfeffd; }

    .overlay-status { font-size: 13px; padding: 6px 8px; border-radius: 8px; }
    .overlay-status.connected { background: rgba(34,197,94,0.12); color: #86efac; }
    .overlay-status.disconnected { background: rgba(244,63,94,0.08); color: #ffd6de; }

    .overlay-bottom {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      justify-content: center;
      padding: 6px;
      pointer-events: none;
      width: calc(100% - 48px);
    }

    .player-card-bottom {
      pointer-events: auto;
      min-width: 120px;
      max-width: 220px;
      padding: 8px 10px;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.04);
      color: #eaf6ff;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* status-badge removed; overlay-status is used instead */

    @media (max-width: 920px) {
      .top-bar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="stage-wrapper">
      <canvas id="stage"></canvas>

      <div class="overlay-qr"><img id="qr-overlay" alt="QR" /></div>

      <div class="overlay-top">
        <div id="overlay-player-count" class="overlay-player-count">0 / 4</div>
        <div class="overlay-score">
          <div class="gauge-track"><div id="overlay-score-fill" class="gauge-fill"></div></div>
          <div id="overlay-score-text" class="gauge-label">0%</div>
        </div>
        <div id="overlay-time" class="overlay-time">00:00</div>
        <div id="overlay-status" class="overlay-status disconnected">disconnected</div>
      </div>

      <div class="overlay-bottom" id="overlay-bottom"></div>
    </div>
  </div>

  <script>
    const MAX_PLAYERS = 4;
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');

    /* overlay elements */
    const overlayPlayerCount = document.getElementById('overlay-player-count');
    const overlayScoreFill = document.getElementById('overlay-score-fill');
    const overlayScoreText = document.getElementById('overlay-score-text');
    const overlayTime = document.getElementById('overlay-time');
    const overlayStatus = document.getElementById('overlay-status');
    const overlayBottom = document.getElementById('overlay-bottom');
    const qrOverlay = document.getElementById('qr-overlay');

    const state = {
      characters: [],
      enemies: [],
      bullets: [],
      items: [],
      game: {
        totalScore: 0,
        targetScore: 100,
        timeLimitMs: 0,
        timeRemainingMs: 0,
        cleared: false,
      },
    };

    const formatTime = (ms) => {
      const seconds = Math.max(0, Math.ceil(ms / 1000));
      const minutes = Math.floor(seconds / 60);
      const remainder = seconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(remainder).padStart(2, '0')}`;
    };

    const renderPlayerSummary = () => {
      overlayBottom.innerHTML = '';

      state.characters.forEach((player, index) => {
        const color = player.color || ['#22d3ee', '#fbbf24', '#a78bfa', '#f472b6'][index] || '#38bdf8';
        const hp = player.hp ?? 0;
        const maxHp = player.maxHp ?? 1;
        const score = player.score ?? 0;
        const healthRatio = Math.max(0, Math.min(1, maxHp === 0 ? 0 : hp / maxHp));

        // side panel card
        const card = document.createElement('div');
        card.className = 'player-card';
        card.innerHTML = `
          <div class="player-icon" style="background: ${color};">${player.number ?? index + 1}</div>
          <div class="player-info">
            <div>HP: ${hp} / ${maxHp} ・ Score: ${score}</div>
            <div class="player-bar"><div class="player-bar-fill" style="width: ${Math.round(healthRatio * 100)}%; background: linear-gradient(90deg, ${color}, #ffffff);"></div></div>
          </div>
        `;
        // no side panel; only bottom overlay

        // bottom overlay (horizontal)
        const bottom = document.createElement('div');
        bottom.className = 'player-card-bottom';
        bottom.innerHTML = `
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:28px;height:28px;border-radius:50%;background:${color};display:grid;place-items:center;font-weight:700;color:#031021;">${player.number ?? index + 1}</div>
            <div style="display:flex;flex-direction:column;align-items:flex-start;">
              <div style="font-weight:700">P${player.number ?? index + 1}</div>
              <div style="font-size:12px;color:#cfeffd">HP: ${hp}/${maxHp} ・ ${score}pt</div>
            </div>
          </div>
          <div style="width:80px;">
            <div style="height:8px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;">
              <div style="height:100%;width:${Math.round(healthRatio*100)}%;background:${color};"></div>
            </div>
          </div>
        `;
        overlayBottom.appendChild(bottom);
      });
    };

    const updateGameUI = () => {
      const { totalScore, targetScore, timeRemainingMs, cleared } = state.game;
      const percent = targetScore > 0 ? Math.min(100, Math.round((totalScore / targetScore) * 100)) : 0;
      // overlay updates (no side panel elements)
      if (overlayScoreFill) overlayScoreFill.style.width = `${percent}%`;
      if (overlayScoreText) overlayScoreText.textContent = `${percent}%`;
      if (overlayTime) overlayTime.textContent = formatTime(timeRemainingMs);
      // overlay updates
      if (overlayPlayerCount) overlayPlayerCount.textContent = `${state.characters.length} / ${MAX_PLAYERS}`;
      renderPlayerSummary();
    };

    const resize = () => {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * scale);
      canvas.height = Math.floor(rect.height * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
    };

    window.addEventListener('resize', resize);
    resize();

    const clientUrl = `${window.location.protocol}//${window.location.host}/client/`;
    // overlay QR only
    if (qrOverlay) qrOverlay.src = `https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(clientUrl)}`;

    const wsProtocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const wsUrl = `${wsProtocol}://${window.location.hostname}:3001`;
    const socket = new WebSocket(wsUrl);

    const setConnected = (connected) => {
      if (overlayStatus) {
        overlayStatus.textContent = connected ? 'connected' : 'disconnected';
        overlayStatus.className = `overlay-status ${connected ? 'connected' : 'disconnected'}`;
      }
    };

    socket.addEventListener('open', () => {
      setConnected(true);
      socket.send(JSON.stringify({ type: 'viewer' }));
    });

    socket.addEventListener('close', () => {
      setConnected(false);
    });

    socket.addEventListener('error', () => {
      setConnected(false);
    });

    socket.addEventListener('message', (event) => {
      let payload;
      try {
        payload = JSON.parse(event.data);
      } catch (error) {
        return;
      }

      if (payload.type === 'update') {
        state.characters = Array.isArray(payload.characters)
          ? payload.characters.slice(0, MAX_PLAYERS)
          : [];
        state.enemies = Array.isArray(payload.enemies) ? payload.enemies : [];
        state.bullets = Array.isArray(payload.bullets) ? payload.bullets : [];
        state.items = Array.isArray(payload.items) ? payload.items : [];
        state.game = payload.game
          ? {
              totalScore: payload.game.totalScore ?? 0,
              targetScore: payload.game.targetScore ?? 100,
              timeLimitMs: payload.game.timeLimitMs ?? 0,
              timeRemainingMs: payload.game.timeRemainingMs ?? 0,
              cleared: payload.game.cleared ?? false,
            }
          : state.game;

        updateGameUI();
      }
    });

    const toCanvasX = (x, width) => width / 2 + x * 70;
    const toCanvasY = (y, height) => height - 120 - y * 42;

    const drawGrid = (width, height) => {
      ctx.save();
      ctx.strokeStyle = 'rgba(56, 189, 248, 0.18)';
      ctx.lineWidth = 1;
      for (let gx = width / 2 - 320; gx <= width / 2 + 320; gx += 64) {
        ctx.globalAlpha = gx === width / 2 ? 0.75 : 0.18;
        ctx.beginPath();
        ctx.moveTo(gx, 34);
        ctx.lineTo(gx, height - 96);
        ctx.stroke();
      }
      for (let gy = height - 120; gy >= 36; gy -= 48) {
        ctx.globalAlpha = gy === height - 120 ? 0.4 : 0.14;
        ctx.beginPath();
        ctx.moveTo(36, gy);
        ctx.lineTo(width - 36, gy);
        ctx.stroke();
      }
      ctx.restore();
    };

    const drawItem = (item, width, height) => {
      const x = toCanvasX(item.x, width);
      const y = toCanvasY(item.y, height);
      ctx.save();
      if (item.type === 'heal') {
        ctx.shadowColor = '#34d399';
        ctx.shadowBlur = 18;
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(x - 10, y - 10, 20, 20);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x - 3, y - 8, 6, 16);
        ctx.fillRect(x - 8, y - 3, 16, 6);
      } else {
        ctx.shadowColor = '#a855f7';
        ctx.shadowBlur = 18;
        ctx.fillStyle = '#8b5cf6';
        ctx.beginPath();
        ctx.moveTo(x - 10, y + 6);
        ctx.lineTo(x + 4, y + 6);
        ctx.lineTo(x - 2, y - 6);
        ctx.lineTo(x + 10, y - 6);
        ctx.lineTo(x - 4, y + 6);
        ctx.lineTo(x + 2, y + 6);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    };

    const drawEnemy = (enemy, width, height) => {
      const x = toCanvasX(enemy.x, width);
      const y = toCanvasY(enemy.y, height);
      const isBig = enemy.type === 'big';
      const radius = isBig ? 24 : 16;
      const color = isBig ? '#f43f5e' : '#ef4444';
      const border = isBig ? '#fbbf24' : '#ffffff';

      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = isBig ? 26 : 16;
      ctx.fillStyle = color;
      ctx.beginPath();
      const points = isBig ? 6 : 4;
      for (let i = 0; i < points; i++) {
        const angle = (Math.PI * 2 * i) / points - Math.PI / 4;
        const offset = radius + (i % 2 === 0 ? 6 : 0);
        const px = x + Math.cos(angle) * offset;
        const py = y + Math.sin(angle) * offset;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      ctx.strokeStyle = border;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < points; i++) {
        const angle = (Math.PI * 2 * i) / points - Math.PI / 4;
        const offset = radius + (i % 2 === 0 ? 6 : 0);
        const px = x + Math.cos(angle) * offset;
        const py = y + Math.sin(angle) * offset;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();

      const hp = enemy.hp ?? 0;
      const maxHp = enemy.maxHp ?? 1;
      const hpRatio = Math.max(0, Math.min(1, hp / maxHp));
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(x - 24, y - radius - 18, 48, 8);
      ctx.fillStyle = '#fb7185';
      ctx.fillRect(x - 24, y - radius - 18, 48 * hpRatio, 8);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.strokeRect(x - 24, y - radius - 18, 48, 8);
    };

    const drawPlayer = (player, index, width, height) => {
      const x = toCanvasX(player.x, width);
      const y = height - 120;
      const color = player.color || ['#22d3ee', '#fbbf24'][index] || '#38bdf8';
      const hp = player.hp ?? 0;
      const maxHp = player.maxHp ?? 1;
      const hpRatio = Math.max(0, Math.min(1, hp / maxHp));

      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 20;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.lineWidth = 3;
      ctx.strokeStyle = '#0f172a';
      ctx.beginPath();
      ctx.arc(x, y, 22, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`P${player.number ?? index + 1}`, x, y + 5);

      ctx.fillStyle = '#0f172a';
      ctx.fillRect(x - 30, y + 26, 60, 10);
      ctx.fillStyle = '#34d399';
      ctx.fillRect(x - 30, y + 26, 60 * hpRatio, 10);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.strokeRect(x - 30, y + 26, 60, 10);
    };

    const draw = () => {
      const rect = canvas.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#040916';
      ctx.fillRect(0, 0, width, height);

      drawGrid(width, height);
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(40, height - 90, width - 80, 6);
      ctx.fillStyle = '#38bdf8';
      ctx.fillRect(40, height - 96, width - 80, 2);

      state.items.forEach((item) => drawItem(item, width, height));
      state.enemies.forEach((enemy) => drawEnemy(enemy, width, height));
      state.bullets.forEach((bullet) => {
        const x = toCanvasX(bullet.x, width);
        const y = toCanvasY(bullet.y, height);
        ctx.save();
        ctx.shadowColor = '#22d3ee';
        ctx.shadowBlur = 16;
        ctx.fillStyle = '#38bdf8';
        ctx.fillRect(x - 5, y - 8, 10, 16);
        ctx.restore();
      });

      state.characters.forEach((player, index) => drawPlayer(player, index, width, height));

      requestAnimationFrame(draw);
    };

    draw();
  </script>
</body>
</html>
